<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMECT – Planos de Aula</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: 'Segoe UI', sans-serif;
      color: #e2e8f0;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    .logo {
      font-size: 42px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 6px;
    }

    p.sub {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 36px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #status {
      font-size: 14px;
      color: #64748b;
      min-height: 20px;
    }

    #status.ok  { color: #22c55e; }
    #status.err { color: #ef4444; }

    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 28px;
      background: #3b82f6;
      color: #fff;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #2563eb; }
    .btn.hidden { display: none; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">📚</div>
  <h1>SMECT – Planos de Aula</h1>
  <p class="sub">Redirecionando para o servidor…</p>

  <div class="spinner" id="spinner"></div>
  <div id="status">Buscando link atualizado…</div>
  <a id="btn" class="btn hidden" href="#">Acessar manualmente</a>
</div>

<script>
  const BIN_ID = '69d8f90b36566621a89b42ee';
  const API    = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

  async function redirecionar() {
    const status  = document.getElementById('status');
    const spinner = document.getElementById('spinner');
    const btn     = document.getElementById('btn');

    try {
      const res  = await fetch(API);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const url  = data.record?.url;

      if (!url || url.includes('placeholder')) {
        throw new Error('Servidor offline no momento.');
      }

      status.textContent = 'Conectado! Redirecionando…';
      status.className   = 'ok';
      btn.href           = url;
      btn.classList.remove('hidden');

      setTimeout(() => { window.location.href = url; }, 1500);

    } catch (e) {
      spinner.style.display = 'none';
      status.textContent    = '⚠️ ' + e.message;
      status.className      = 'err';
      btn.textContent       = 'Tentar novamente';
      btn.href              = '#';
      btn.classList.remove('hidden');
      btn.onclick = () => { location.reload(); return false; };
    }
  }

  redirecionar();
</script>

</body>
</html>
